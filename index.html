<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文件名提取工具</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface-hover: #22262f;
    --border: #2a2e3a;
    --text: #e4e6eb;
    --text-dim: #8b8fa3;
    --accent: #6c8aff;
    --accent-hover: #8aa2ff;
    --green: #4ade80;
    --red: #f87171;
    --radius: 10px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 40px 20px;
    line-height: 1.6;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
  }

  h1 {
    font-size: 1.6rem;
    font-weight: 700;
    margin-bottom: 6px;
    letter-spacing: -0.02em;
  }

  .subtitle {
    color: var(--text-dim);
    font-size: 0.9rem;
    margin-bottom: 32px;
  }

  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface);
    position: relative;
  }

  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--accent);
    background: rgba(108, 138, 255, 0.05);
  }

  .drop-zone-icon {
    font-size: 2.4rem;
    margin-bottom: 12px;
    display: block;
  }

  .drop-zone-text {
    font-size: 1rem;
    color: var(--text-dim);
  }

  .drop-zone-text strong {
    color: var(--accent);
  }

  .drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
  }

  .toolbar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
    margin-top: 24px;
    margin-bottom: 16px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    color: var(--text);
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn:hover { background: var(--surface-hover); border-color: var(--accent); }

  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .btn-primary:hover {
    background: var(--accent-hover);
  }

  .btn-danger {
    border-color: var(--red);
    color: var(--red);
  }

  .btn-danger:hover {
    background: rgba(248, 113, 113, 0.1);
  }

  .count-badge {
    margin-left: auto;
    font-size: 0.85rem;
    color: var(--text-dim);
  }

  .count-badge span {
    color: var(--accent);
    font-weight: 600;
  }

  .file-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .file-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.9rem;
    transition: all 0.15s;
    font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
  }

  .file-item:hover {
    border-color: var(--accent);
    background: var(--surface-hover);
  }

  .file-item .name {
    flex: 1;
    word-break: break-all;
  }

  .file-item .name .base { color: var(--text); }
  .file-item .name .ext { color: var(--text-dim); }

  .file-item .btn-group {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }

  .file-item .copy-btn {
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--text-dim);
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .file-item .copy-btn:hover {
    color: var(--accent);
    border-color: var(--accent);
  }

  .file-item .copy-btn.copied {
    color: var(--green);
    border-color: var(--green);
  }

  .textarea-wrap {
    margin-top: 24px;
  }

  .textarea-wrap label {
    display: block;
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  textarea {
    width: 100%;
    min-height: 140px;
    padding: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
    font-size: 0.88rem;
    resize: vertical;
    line-height: 1.7;
  }

  textarea:focus {
    outline: none;
    border-color: var(--accent);
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--green);
    color: #000;
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 0.88rem;
    font-weight: 600;
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    pointer-events: none;
    z-index: 99;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .empty-state {
    text-align: center;
    padding: 32px;
    color: var(--text-dim);
    font-size: 0.9rem;
  }

  .filter-input {
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    color: var(--text);
    font-size: 0.85rem;
    width: 180px;
    transition: border-color 0.15s;
  }

  .filter-input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .filter-input::placeholder { color: var(--text-dim); }
</style>
</head>
<body>

<div class="container">
  <h1>📁 文件名提取工具</h1>
  <p class="subtitle">拖入文件或文件夹，提取文件名列表，支持一键复制</p>

  <div class="drop-zone" id="dropZone">
    <span class="drop-zone-icon">📂</span>
    <p class="drop-zone-text">拖拽文件到这里，或 <strong>点击选择文件</strong></p>
    <input type="file" id="fileInput" multiple webkitdirectory>
  </div>

  <div id="resultsArea" style="display:none;">
    <div class="toolbar">
      <button class="btn btn-primary" onclick="copyAll()">📋 复制全部</button>
      <button class="btn" onclick="downloadTxt()">💾 保存为 TXT</button>
      <button class="btn btn-danger" onclick="clearAll()">✕ 清空</button>
      <input class="filter-input" type="text" id="filterInput" placeholder="🔍 过滤文件名..." oninput="renderList()">
      <div class="count-badge">共 <span id="totalCount">0</span> 个文件</div>
    </div>

    <div class="file-list" id="fileList"></div>

    <div class="textarea-wrap">
      <label>📄 完整文件名列表（可直接复制）</label>
      <textarea id="textOutput" readonly></textarea>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const resultsArea = document.getElementById('resultsArea');
const fileList = document.getElementById('fileList');
const textOutput = document.getElementById('textOutput');
const totalCount = document.getElementById('totalCount');
const filterInput = document.getElementById('filterInput');

let allNames = [];

dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.classList.add('dragover');
});

dropZone.addEventListener('dragleave', () => {
  dropZone.classList.remove('dragover');
});

dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  handleItems(e.dataTransfer.items);
});

fileInput.addEventListener('change', () => {
  const files = Array.from(fileInput.files);
  const names = files.map(f => f.name);
  addNames(names);
});

async function handleItems(items) {
  const names = [];
  const promises = [];

  for (const item of items) {
    const entry = item.webkitGetAsEntry?.();
    if (entry) {
      promises.push(traverseEntry(entry, names));
    }
  }

  await Promise.all(promises);
  addNames(names);
}

function traverseEntry(entry, names) {
  return new Promise(resolve => {
    if (entry.isFile) {
      names.push(entry.name);
      resolve();
    } else if (entry.isDirectory) {
      const reader = entry.createReader();
      const readBatch = () => {
        reader.readEntries(async entries => {
          if (entries.length === 0) { resolve(); return; }
          const childPromises = entries.map(e => traverseEntry(e, names));
          await Promise.all(childPromises);
          readBatch();
        });
      };
      readBatch();
    }
  });
}

function addNames(names) {
  const unique = new Set(allNames);
  names.forEach(n => {
    if (n && !n.startsWith('.')) unique.add(n);
  });
  allNames = [...unique].sort((a, b) => a.localeCompare(b, 'zh-CN'));
  renderList();
  resultsArea.style.display = 'block';
  showToast(`已提取 ${allNames.length} 个文件名`);
}

function renderList() {
  const keyword = filterInput.value.toLowerCase();
  const filtered = keyword
    ? allNames.filter(n => n.toLowerCase().includes(keyword))
    : allNames;

  totalCount.textContent = filtered.length;
  textOutput.value = filtered.join('\n');

  fileList.innerHTML = filtered.length === 0
    ? '<div class="empty-state">没有匹配的文件</div>'
    : filtered.map(name => {
        const dotIdx = name.lastIndexOf('.');
        const base = dotIdx > 0 ? name.substring(0, dotIdx) : name;
        const ext = dotIdx > 0 ? name.substring(dotIdx) : '';
        return `
        <div class="file-item">
          <span class="name"><span class="base">${escapeHtml(base)}</span><span class="ext">${escapeHtml(ext)}</span></span>
          <div class="btn-group">
            <button class="copy-btn" onclick="copySingle(this, '${escapeJs(base)}')">复制名称</button>
            <button class="copy-btn" onclick="copySingle(this, '${escapeJs(name)}')">复制全名</button>
          </div>
        </div>`;
      }).join('');
}

function copySingle(btn, name) {
  navigator.clipboard.writeText(name).then(() => {
    btn.textContent = '已复制 ✓';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '复制';
      btn.classList.remove('copied');
    }, 1500);
  });
}

function copyAll() {
  const text = textOutput.value;
  navigator.clipboard.writeText(text).then(() => {
    showToast('已复制全部文件名到剪贴板');
  });
}

function downloadTxt() {
  const text = textOutput.value;
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'filenames.txt';
  a.click();
  URL.revokeObjectURL(url);
  showToast('文件已下载: filenames.txt');
}

function clearAll() {
  allNames = [];
  filterInput.value = '';
  renderList();
  resultsArea.style.display = 'none';
  fileInput.value = '';
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function escapeJs(str) {
  return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}
</script>
</body>
</html>
